function totals(mk){
  const d=DATA[mk];if(!d)return null;
  const t={sales:0,orders:0,adCost:0,adRev:0};
  d.sites.forEach(s=>{t.sales+=s.sales||0;t.orders+=s.orders||0;t.adCost+=s.adCost||0;t.adRev+=s.adRev||0});
  t.roas=t.adCost>0?t.adRev/t.adCost:null;
  t.aov=t.orders>0?t.sales/t.orders:null;
  return t;
}

function switchTab(tab){
  curTab=tab;
  ["sales","trend","instagram"].forEach(t=>{
    document.getElementById("tab-"+t).classList.toggle("active",t===tab);
    document.getElementById("pane-"+t).style.display=t===tab?"block":"none";
  });
  destroyCharts();
  if(tab==="sales") renderSales();
  else if(tab==="trend") renderTrendPane();
  else renderInstagramPane();
}

let igDailyData={};
async function loadIGData(){try{const r=await window.storage.get("ig_daily");igDailyData=r?JSON.parse(r.value):{};}catch(e){igDailyData={};}}
async function saveIGData(){try{await window.storage.set("ig_daily",JSON.stringify(igDailyData));}catch(e){}}
function getTodayKey(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}
function getLatestEntry(){const keys=Object.keys(igDailyData).sort();return keys.length>0?{date:keys[keys.length-1],...igDailyData[keys[keys.length-1]]}:null;}
function getPrevEntry(){const keys=Object.keys(igDailyData).sort();return keys.length>1?{date:keys[keys.length-2],...igDailyData[keys[keys.length-2]]}:null;}
function diffBadge(cur,prev,unit=""){if(cur==null||prev==null)return "";const d=cur-prev;if(d===0)return `<span class="ig-stat-diff diff-flat">氓陇聣氓聦聳茫聛陋茫聛聴</span>`;const sign=d>0?"+":"";const cls=d>0?"diff-up":"diff-down";return `<span class="ig-stat-diff ${cls}">${sign}${fmtK(d)}${unit} 氓聣聧氓聸聻忙炉聰</span>`;}
async function saveIGEntry(followers,reach,impressions,interactions,dateKey){
  const key=dateKey||getTodayKey();
  igDailyData[key]={followers,reach,impressions,interactions};
  await saveIGData();renderInstagramPane();
}

// 忙聹聢忙卢隆茫聝卢茫聝聺茫聝录茫聝聢
function pearson(xs,ys){
  const n=xs.length;if(n<2)return null;
  const mx=xs.reduce((a,b)=>a+b,0)/n,my=ys.reduce((a,b)=>a+b,0)/n;
  let sxy=0,sxx=0,syy=0;
  for(let i=0;i<n;i++){const dx=xs[i]-mx,dy=ys[i]-my;sxy+=dx*dy;sxx+=dx*dx;syy+=dy*dy;}
  if(sxx===0||syy===0)return null;
  return sxy/Math.sqrt(sxx*syy);
}
function corrLabel(r){
  if(r==null)return"莽庐聴氓聡潞盲赂聧氓聫炉";
  const a=Math.abs(r);
  if(a>=0.8)return"茅聺聻氓赂赂茫聛芦氓录路茫聛聞莽聸赂茅聳垄";
  if(a>=0.6)return"氓录路茫聛聞莽聸赂茅聳垄";
  if(a>=0.4)return"盲赂颅莽篓聥氓潞娄茫聛庐莽聸赂茅聳垄";
  if(a>=0.2)return"氓录卤茫聛聞莽聸赂茅聳垄";
  return"茫聛禄茫聛录莽聸赂茅聳垄茫聛陋茫聛聴";
}
